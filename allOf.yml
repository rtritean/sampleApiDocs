openapi: 3.1.0
info:
  title: Complex Inheritance & Intersection Test
  version: 1.3.0
  description: |
    A stress test for `allOf` merging logic with a `oneOf` discriminator.

paths:
  /products/books:
    post:
      summary: Create a complex book record
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/PhysicalBook'
                - $ref: '#/components/schemas/DigitalBook'
              # This tells the UI/Validator which schema is which
              discriminator:
                propertyName: bookType
                mapping:
                  physical: '#/components/schemas/PhysicalBook'
                  digital: '#/components/schemas/DigitalBook'
      responses:
        "201":
          description: Created

components:
  schemas:
    BaseProduct:
      type: object
      required: [id, sku, bookType] # bookType is now required for all
      properties:
        id:
          type: string
          format: uuid
        sku:
          type: string
          pattern: "^[A-Z]{3}-[0-9]{4}$"
        bookType:
          type: string
          description: "Discriminator field to distinguish between physical and digital."
        status:
          type: string
          enum: [DRAFT, PUBLISHED, ARCHIVED, DELETED]

    AuditMeta:
      type: object
      required: [timestamps]
      properties:
        timestamps:
          type: object
          properties:
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
        tags:
          type: array
          minItems: 1
          items:
            type: string

    ActiveProductConstraint:
      type: object
      properties:
        status:
          enum: [PUBLISHED]
        tags:
          maxItems: 5
          uniqueItems: true

    PhysicalBook:
      title: Physical Book
      allOf:
        - $ref: '#/components/schemas/BaseProduct'
        - $ref: '#/components/schemas/AuditMeta'
        - $ref: '#/components/schemas/ActiveProductConstraint'
        - type: object
          required: [dimensions, weight]
          properties:
            # Constraining the discriminator for this specific branch
            bookType:
              type: string
              const: physical 
            dimensions:
              type: object
              required: [height, width]
              properties:
                height: { type: number }
                width: { type: number }
                unit: { type: string, enum: [cm, in] }
            weight:
              type: number
            distribution:
              type: array
              items:
                allOf:
                  - $ref: '#/components/schemas/WarehouseLocation'
                  - type: object
                    properties:
                      stockCount: { type: integer, minimum: 0 }

    DigitalBook:
      title: Digital Book
      allOf:
        - $ref: '#/components/schemas/BaseProduct'
        - $ref: '#/components/schemas/AuditMeta'
        - type: object
          required: [downloadUrl, fileSize]
          properties:
            bookType:
              type: string
              const: digital
            downloadUrl: { type: string, format: uri }
            fileSize: { type: integer }
            formats:
              type: array
              items:
                type: string
                enum: [pdf, epub, mobi]

    WarehouseLocation:
      type: object
      required: [warehouseCode]
      properties:
        warehouseCode: { type: string }
        region: { type: string }
