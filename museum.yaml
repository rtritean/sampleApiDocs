openapi: 3.1.0
info:
  title: Redocly Museum API - Lifecycle Edition
  description: |
    ### Feature Flag & Lifecycle Testing
    This spec tests how the UI handles **Internal** operations and **Deprecated** (Obsolete) fields.
    - `/inventory` is now marked as `x-internal`.
    - `MuseumDailyHours.status` is now `deprecated`.
  version: 1.2.1
servers:
  - url: "https://redocly.com/_mock/docs/openapi/museum-api"

paths:
  /inventory:
    get:
      summary: List inventory items
      x-internal: true # Extension-based internal marking
      x-ui-label: [{ text: "Internal Only", severity: "error" }]
      description: |
        **Internal Operation**: This endpoint should only be visible to staff. 
        Verify if your sidebar or header displays an "Internal" badge.
      operationId: listInventory
      tags: [Operations]
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Zone"

  /museum-hours:
    get:
      summary: Get museum hours
      operationId: getMuseumHours
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MuseumHours"

components:
  schemas:
    MuseumHours:
      type: array
      items:
        $ref: "#/components/schemas/MuseumDailyHours"

    MuseumDailyHours:
      type: object
      required: [date, timeOpen, timeClose]
      properties:
        date: { type: string, description: "The calendar date." }
        timeOpen: { type: string, description: "Opening time." }
        timeClose: { type: string, description: "Closing time." }
        status:
          type: string
          deprecated: true # NATIVE OPENAPI ELEMENT (Obsolete)
          x-ui-label: [{ text: "Obsolete", severity: "warning" }]
          description: |
            **DEPRECATED**: This field is being replaced by the `occupancy` object. 
            Do not use in new integrations.
          enum: [open, closed]

    Zone:
      type: object
      required: [zoneName, shelfContents]
      properties:
        zoneName: { type: string, description: "The area name." }
        shelfContents:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"

    Artifact:
      type: object
      required: [id, name]
      properties:
        id: { type: string, description: "Artifact ID." }
        name: { type: string, description: "Artifact Name." }
