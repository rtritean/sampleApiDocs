openapi: 3.1.0
info:
  title: Array & Map Stress Test
  version: 1.0.0
  description: |
    Tests for **Array-in-Array**, **Object-in-Array**, and **Map/Pattern Map** patterns.
paths:
  /inventory:
    get:
      summary: List inventory items
      description: "Returns a complex **nested array** structure."
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: array
                description: "The primary list of storage zones."
                items:
                  type: object
                  description: "A specific **Zone** in the museum."
                  required: [shelfContents, zoneMap, patternMap]
                  properties:
                    zoneName:
                      type:
                        - string
                        - null
                      description: "Name of the wing (e.g., *East Wing*). May be null."
                    shelfContents:
                      type: array
                      description: "A nested list of items on the shelf."
                      items:
                        $ref: "#/components/schemas/Artifact"
                    zoneMap:
                      type: object
                      description: "Dynamic map of shelf labels to item counts."
                      minProperties: 1
                      maxProperties: 10
                      additionalProperties:
                        type: integer
                        description: "Count of items on shelf."
                      propertyNames:
                        type: string
                        pattern: "^[a-zA-Z0-9_-]+$"
                    patternMap:
                      type: object
                      description: "Pattern map for special shelf keys."
                      patternProperties:
                        "^special-.*":
                          type: string
                          description: "Special shelf label."
                      examples:
                        - { special-1: "VIP Shelf" }
                        - { special-2: "Archive Shelf" }
components:
  schemas:
    Artifact:
      type: object
      description: "A physical object stored in the museum."
      required: [id, name]
      properties:
        id: 
          type: string
          description: "Internal `UID` for the artifact."
        name: 
          type: string
          description: "**Common name** of the piece."
        restorationHistory:
          type: array
          description: "List of dates when the item was *cleaned* or *repaired*."
          items:
            type: string
            format: date
            description: "A specific **restoration event** date."
