openapi: 3.1.0
info:
  title: Array & Map Stress Test
  version: 1.0.0
  description: |
    Tests for **Array-in-Array**, **Object-in-Array**, and **Polymorphism** (oneOf, allOf, anyOf).
paths:
  /inventory/complex-demo:
    post:
      summary: Create a complex inventory record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryCreateRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseWrapper'
  /inventory/items:
    get:
      summary: List inventory items
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Artifact"

components:
  schemas:
    # --- allOf Example ---
    # Combines the base Artifact properties with specific Restoration data
    Artifact:
      allOf:
        - $ref: '#/components/schemas/BaseObject'
        - type: object
          properties:
            restorationHistory:
              type: array
              items:
                type: string
                format: date

    BaseObject:
      type: object
      required: [id]
      properties:
        id:
          type: string
        name:
          type: string

    # --- oneOf Example ---
    # The payload MUST be exactly one of these types (Physical or Digital)
    InventoryItem:
      oneOf:
        - $ref: '#/components/schemas/PhysicalItem'
        - $ref: '#/components/schemas/DigitalItem'

    PhysicalItem:
      type: object
      required: [dimensions]
      properties:
        dimensions:
          type: string

    DigitalItem:
      type: object
      required: [fileSize]
      properties:
        fileSize:
          type: integer

    # --- anyOf Example ---
    # The response can be a success, a warning, or both (combined)
    ResponseWrapper:
      anyOf:
        - $ref: '#/components/schemas/InventoryCreateResponse'
        - $ref: '#/components/schemas/SystemWarning'

    InventoryCreateResponse:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
        status:
          type: string

    SystemWarning:
      type: object
      properties:
        warningCode:
          type: string
        message:
          type: string

    InventoryCreateRequest:
      type: object
      required: [name, items]
      properties:
        name:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/InventoryItem'
